<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

    <div class="box">
        <input type="text" id="l">
        <select id="op">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>
        <input type="text" id="r">
        <input type="submit" id="go" value="Try me!">
    </div>

    <script src="calc.js"></script>
</body>
</html>
