<!DOCTYPE html>
<html>
<head>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    height: 100%;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    width: 100%;
    min-height: 100vh;
  }

  .box {
    flex: 1 1 33.33%; 
    padding: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  @media (max-width: 600px) {
    .box {
      flex: 1 1 100%;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="box" style="background-color:#bbb">
    <p>Text 1</p>
  </div>
  <div class="box" style="background-color:#ccc">
    <p>Text 2</p>
  </div>
</div>

</body>
</html>
